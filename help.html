    <script>
        function generateFundsContent() {
            return `
                <div class="tips-wrapper">
                    <h2 style="font-family: 'Rubik Mono One', monospace; text-align:center; margin-bottom:24px;">Фонды</h2>
                    <div class="funds-scroll-area">
                        <div class="fund-block">
                            <div class="fund-title">
                                <a href="https://polarbearsinternational.org/" target="_blank" rel="noopener noreferrer">Polar Bears International</a>
                            </div>
                            <div class="fund-description">
                                Ведущая некоммерческая организация, полностью посвящённая сохранению белых медведей и их арктической среды обитания. 
                                Объединяет учёных, волонтёров и сторонников по всему миру, финансирует исследования, борется с климатическими изменениями 
                                и развивает образовательные программы. Прямые действия и научный подход делают этот фонд главным голосом в защите белых медведей.
                            </div>
                        </div>
                        <div class="fund-block">
                            <div class="fund-title">
                                <a href="https://www.worldwildlife.org/species/polar-bear" target="_blank" rel="noopener noreferrer">WWF — Программа защиты белых медведей</a>
                            </div>
                            <div class="fund-description">
                                Всемирный фонд дикой природы реализует проекты по снижению конфликтов между человеком и медведем, мониторингу популяций 
                                и борьбе с потерей морского льда. WWF поддерживает приполярные сообщества, помогает внедрять устойчивые практики 
                                и активно лоббирует климатические решения на международном уровне. Их работа охватывает пять арктических стран.
                            </div>
                        </div>
                        <div class="fund-block">
                            <div class="fund-title">
                                <a href="https://polartravelclub.ru/about/charity/" target="_blank" rel="noopener noreferrer">Клуб полярных путешествий</a>
                            </div>
                            <div class="fund-description">
                                Организация объединяет энтузиастов Арктики и профессионалов полярных экспедиций. Часть средств от туров направляется 
                                на природоохранные проекты, включая поддержку исследований белых медведей и просвещение местных сообществ. 
                                Клуб способствует развитию ответственного туризма, который не вредит хрупкой арктической экосистеме.
                            </div>
                        </div>
                    </div>
                    <button class="popup-close-btn" onclick="closePopup()">Вернуться</button>
                </div>
            `;
        }

        function generateFormContent(title) {
            return `
                <div class="form-popup-wrapper">
                    <h2>${title}</h2>
                    <div class="inputs-container">
                        <input type="text" placeholder="ФИО" autocomplete="name" id="volunteerName">
                        <input type="tel" placeholder="Телефон" autocomplete="tel" id="volunteerPhone">
                        <input type="email" placeholder="Почта" autocomplete="email" id="volunteerEmail">
                        
                        <div class="gender-select-wrapper">
                            <input type="text" placeholder="Пол" id="volunteerGender" readonly autocomplete="off">
                            <div class="gender-dropdown side-dropdown" id="genderDropdown">
                                <div class="gender-option" data-gender="female">Женский</div>
                                <div class="gender-option" data-gender="male">Мужской</div>
                            </div>
                        </div>
                        
                        <div class="age-input">
                            <input type="number" placeholder="Возраст" id="volunteerAge" min="1" max="120" step="1">
                            <div class="age-error-msg" id="ageErrorMsg">⚠️ Стать волонтером можно только с 14 лет</div>
                        </div>
                    </div>
                    <div class="buttons">
                        <button class="subscribe" id="submitVolunteerBtn">Стать волонтером</button>
                        <button class="back" onclick="closePopup()">Назад</button>
                    </div>
                </div>
            `;
        }

        function bindVolunteerFormEvents() {
            // Поле пола с выпадающим списком (сбоку)
            const genderInput = document.getElementById('volunteerGender');
            const genderDropdown = document.getElementById('genderDropdown');
            const genderOptions = document.querySelectorAll('.gender-option');
            
            if (genderInput && genderDropdown) {
                // Позиционирование выпадающего списка относительно поля
                function positionDropdown() {
                    const rect = genderInput.getBoundingClientRect();
                    const popupContent = genderInput.closest('.popup-content');
                    const popupRect = popupContent.getBoundingClientRect();
                    
                    // Позиционируем справа от поля
                    genderDropdown.style.position = 'fixed';
                    genderDropdown.style.top = `${rect.top}px`;
                    genderDropdown.style.left = `${rect.right + 5}px`;
                    
                    // Проверяем, не выходит ли за правый край экрана
                    const dropdownRect = genderDropdown.getBoundingClientRect();
                    if (dropdownRect.right > window.innerWidth) {
                        // Если выходит, показываем слева
                        genderDropdown.style.left = `${rect.left - dropdownRect.width - 5}px`;
                    }
                }
                
                genderInput.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isOpen = genderDropdown.classList.contains('show');
                    
                    // Закрываем все другие дропдауны
                    document.querySelectorAll('.gender-dropdown.show').forEach(drop => {
                        if (drop !== genderDropdown) drop.classList.remove('show');
                    });
                    
                    if (!isOpen) {
                        positionDropdown();
                        genderDropdown.classList.add('show');
                    } else {
                        genderDropdown.classList.remove('show');
                    }
                });
                
                genderOptions.forEach(option => {
                    option.addEventListener('click', function() {
                        const gender = this.getAttribute('data-gender');
                        const genderText = this.textContent;
                        genderInput.value = genderText;
                        genderInput.setAttribute('data-gender-value', gender);
                        genderDropdown.classList.remove('show');
                    });
                });
                
                // При скролле или ресайзе закрываем дропдаун и обновляем позицию при открытии
                window.addEventListener('scroll', function() {
                    if (genderDropdown.classList.contains('show')) {
                        genderDropdown.classList.remove('show');
                    }
                });
                
                window.addEventListener('resize', function() {
                    if (genderDropdown.classList.contains('show')) {
                        genderDropdown.classList.remove('show');
                    }
                });
                
                document.addEventListener('click', function(e) {
                    if (!genderInput.contains(e.target) && !genderDropdown.contains(e.target)) {
                        genderDropdown.classList.remove('show');
                    }
                });
            }
            
            // Валидация возраста
            const ageInput = document.getElementById('volunteerAge');
            const submitBtn = document.getElementById('submitVolunteerBtn');
            const ageErrorMsg = document.getElementById('ageErrorMsg');
            
            if (ageInput && submitBtn) {
                function validateAge() {
                    const age = parseInt(ageInput.value, 10);
                    const isValid = !isNaN(age) && age >= 14 && age <= 120;
                    
                    if (!isValid && ageInput.value !== '') {
                        ageInput.classList.add('error-age');
                        if (ageErrorMsg) ageErrorMsg.classList.add('show');
                    } else {
                        ageInput.classList.remove('error-age');
                        if (ageErrorMsg) ageErrorMsg.classList.remove('show');
                    }
                    
                    if (ageInput.value === '') {
                        ageInput.classList.remove('error-age');
                        if (ageErrorMsg) ageErrorMsg.classList.remove('show');
                    }
                }
                
                ageInput.addEventListener('input', validateAge);
                ageInput.addEventListener('blur', function() {
                    const age = parseInt(ageInput.value, 10);
                    if (ageInput.value !== '' && (isNaN(age) || age < 14)) {
                        ageInput.classList.add('error-age');
                        if (ageErrorMsg) ageErrorMsg.classList.add('show');
                    } else if (ageInput.value !== '' && age >= 14) {
                        ageInput.classList.remove('error-age');
                        if (ageErrorMsg) ageErrorMsg.classList.remove('show');
                    } else if (ageInput.value === '') {
                        ageInput.classList.remove('error-age');
                        if (ageErrorMsg) ageErrorMsg.classList.remove('show');
                    }
                });
                
                const newSubmitBtn = submitBtn.cloneNode(true);
                submitBtn.parentNode.replaceChild(newSubmitBtn, submitBtn);
                newSubmitBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    const name = document.getElementById('volunteerName')?.value.trim();
                    const phone = document.getElementById('volunteerPhone')?.value.trim();
                    const email = document.getElementById('volunteerEmail')?.value.trim();
                    const genderInputField = document.getElementById('volunteerGender');
                    const gender = genderInputField?.value.trim();
                    const age = document.getElementById('volunteerAge')?.value.trim();
                    const ageNum = parseInt(age, 10);
                    
                    let hasError = false;
                    let errorMessage = '';
                    
                    if (!name) {
                        errorMessage = 'Пожалуйста, заполните поле ФИО';
                        hasError = true;
                    }
                    else if (!phone) {
                        errorMessage = 'Пожалуйста, заполните поле Телефон';
                        hasError = true;
                    }
                    else if (!email) {
                        errorMessage = 'Пожалуйста, заполните поле Почта';
                        hasError = true;
                    }
                    else if (!gender || gender === '') {
                        errorMessage = 'Пожалуйста, выберите пол';
                        hasError = true;
                    }
                    else if (!age) {
                        errorMessage = 'Пожалуйста, заполните поле Возраст';
                        hasError = true;
                        if (ageErrorMsg) ageErrorMsg.classList.add('show');
                    }
                    else if (isNaN(ageNum)) {
                        errorMessage = 'Возраст должен быть числом';
                        hasError = true;
                        if (ageErrorMsg) ageErrorMsg.classList.add('show');
                    }
                    else if (ageNum < 14) {
                        errorMessage = 'Стать волонтером можно лицам старше 14 лет';
                        hasError = true;
                        if (ageErrorMsg) ageErrorMsg.classList.add('show');
                        if (ageInput) ageInput.classList.add('error-age');
                    }
                    else if (ageNum > 120) {
                        errorMessage = 'Пожалуйста, введите корректный возраст';
                        hasError = true;
                        if (ageErrorMsg) ageErrorMsg.classList.add('show');
                        if (ageInput) ageInput.classList.add('error-age');
                    }
                    
                    if (hasError) {
                        alert(errorMessage);
                    } else {
                        alert(`Спасибо, ${name}! Вы записаны в волонтеры.\nПол: ${gender}\nВозраст: ${age}\nМы свяжемся с вами по телефону ${phone} или email ${email}`);
                        closePopup();
                    }
                });
            }
        }
        
        function generateEcoTipsContent() {
            return `
                <div class="tips-wrapper">
                    <h2 style="font-family: 'Rubik Mono One', monospace; text-align:center; margin-bottom:24px;">Эко-советы</h2>
                    <div class="tips-scroll-area">
                        <div class="tip-block">
                            <div class="tip-title">1. Сокращение пластика</div>
                            <div class="tip-text">
                                Используйте многоразовые бутылки для воды, эко-сумки вместо пакетов, отказывайтесь от одноразовой посуды. 
                                Ежегодно тонны пластика попадают в Северный Ледовитый океан, угрожая среде обитания белых медведей.
                                Маленькая замена в привычках — огромный вклад в чистоту Арктики.
                            </div>
                        </div>
                        <div class="tip-block">
                            <div class="tip-title">2. Энергосбережение</div>
                            <div class="tip-text">
                                Выключайте свет, когда выходите из комнаты, используйте энергоэффективные лампы и приборы класса А++.
                                Снижая углеродный след, мы замедляем таяние полярных льдов — основного дома белого медведя.
                                Даже переход на "умные" розетки сокращает выбросы CO₂.
                            </div>
                        </div>
                        <div class="tip-block">
                            <div class="tip-title">3. Осознанное передвижение</div>
                            <div class="tip-text">
                                По возможности отдавайте предпочтение общественному транспорту, велосипеду или пешим прогулкам.
                                Если пользуетесь автомобилем, попробуйте практиковать каршеринг или электромобили.
                                Меньше выхлопных газов — чище воздух и стабильнее климат, от которого зависит выживание белых медведей.
                            </div>
                        </div>
                        <div class="tip-block">
                            <div class="tip-title">4. Ответственное потребление</div>
                            <div class="tip-text">
                                Покупайте местные сезонные продукты, сокращайте пищевые отходы. Переработка органики и 
                                уменьшение количества выбрасываемой еды снижают нагрузку на полигоны и уменьшают метановые выбросы. 
                                А значит — защищают арктические экосистемы.
                            </div>
                        </div>
                    </div>
                    <button class="popup-close-btn" onclick="closePopup()">Вернуться</button>
                </div>
            `;
        }

        function handleCardClick(title, cardType) {
            const popup = document.getElementById('popup');
            const popupContentDiv = document.getElementById('popupContent');
            
            if (cardType === 'ecoTips') {
                popupContentDiv.innerHTML = generateEcoTipsContent();
                popupContentDiv.className = 'popup-content tips-popup';
            } 
            else if (cardType === 'funds') {
                popupContentDiv.innerHTML = generateFundsContent();
                popupContentDiv.className = 'popup-content tips-popup';
            }
            else {
                popupContentDiv.innerHTML = generateFormContent(title);
                popupContentDiv.className = 'popup-content form-popup';
                setTimeout(() => {
                    bindVolunteerFormEvents();
                }, 10);
            }
            
            popup.style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }

        function closeOutside(event) {
            if (event.target.id === 'popup') {
                closePopup();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const popup = document.getElementById('popup');
            if (popup) popup.style.display = 'none';
        });
    </script>
</body>
